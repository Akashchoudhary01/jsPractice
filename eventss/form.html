<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

   <style>
body {
    padding: 0;
    margin: 0;
    background-color: #333;
    font-family: Arial, sans-serif;
}

#main {

    display: flex;
    gap: 30px;
    padding: 30px;
}

#form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input {
    padding: 10px;
    color: black;
    border: none;
    border-radius: 5px;
}

.card {
    background: white;
    padding: 20px;
    max-width: 300px;
    border-radius: 10px;
    text-align: center;
}

.profile img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
}
</style>

</head>

<body>

    <div id="main">
        <form id="form" name="form">
            <input type="text" placeholder="name">
            <input type="text" placeholder="age">
            <input type="text" placeholder="email">
            <input type="text" placeholder="profile">
            <input type="submit">
        </form>
    </div>
  <script src="./form.js"></script>
</body>

</html>
