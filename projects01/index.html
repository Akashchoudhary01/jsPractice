<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Body */
        body {
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Search input (if you add later) */
        input {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            outline: none;
            border-radius: 8px;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* Cards container (IMPORTANT for layout) */
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Card */
        .card {
            display: flex;
            margin-top: 20px;
            max-width: 400px;
            gap: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }
        .h2{
            font-size: 22px;
            color: red;
        }

        /* Hover effect */
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        /* Image */
        .card img {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Content */
        .content {
            flex: 1;
        }

        .content h1 {
            font-size: 18px;
            margin-bottom: 6px;
            color: #333;
        }

        .content p {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        /* Responsive */
        @media(max-width: 600px) {
            .card {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .card img {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>

<body>
    <input type="text"  placeholder="search..">
    <h2 class="h2"></h2>
    <div class="container">

    </div>

    <script src="./script.js"></script>

</body>

</html>
