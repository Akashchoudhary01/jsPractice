<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Example</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
}

.form-container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.form-container h2{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}
#text{
    text-align: center ;
    margin-top: 10px;
    color: gray;
}
</style>
</head>

<body>

<div class="form-container">
<h2>Registration Form</h2>

<form>

<div class="form-group">
<label>Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" placeholder="Enter your age" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password" required>
</div>

<button type="submit">Submit</button>

</form>
<div id="text">
    hello 

</div>
</div>

</body>
</html>
